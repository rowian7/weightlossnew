{% extends 'base.html' %}
{% block title %}Log In — Weight a Minute{% endblock %}
{% block head %}
<style>
.auth-page {
    min-height: calc(100vh - var(--nav) - 120px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 16px;
}
.auth-box {
    width: 100%; max-width: 400px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 32px;
}
@media(max-width:480px) { .auth-box { padding: 24px 18px; border-radius: 12px; } }
.auth-title { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
.auth-sub { color: var(--soft); font-size: 0.9rem; margin-bottom: 28px; }
.field-label-plain { font-size: 0.83rem; font-weight: 600; color: var(--soft); display: block; margin-bottom: 6px; }
.auth-footer { text-align: center; color: var(--dim); font-size: 0.85rem; margin-top: 18px; }
.auth-footer a { color: var(--mid); text-decoration: none; font-weight: 600; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Log in to see your calculation history.</div>

        <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="field">
                <label class="field-label-plain" for="email">Email address</label>
                <input type="email" id="email" name="email" required
                    placeholder="you@example.com"
                    autocomplete="email" inputmode="email" autofocus/>
            </div>
            <div class="field">
                <label class="field-label-plain" for="password">Password</label>
                <input type="password" id="password" name="password" required
                    placeholder="••••••••" autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:6px">
                Log in →
            </button>
        </form>

        <div class="auth-footer">
            No account? <a href="{{ url_for('register') }}">Sign up free</a>
        </div>
    </div>
</div>
{% endblock %}
